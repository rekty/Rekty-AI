# Memory - dikurangi agar tidak OOM, cukup untuk build release
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED


# Matikan daemon dan parallel agar hemat RAM
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=false

# Android
android.useAndroidX=true
android.enableJetifier=true
